{% load static %}

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
            🌿 植物環境観測システム（Django版）
        {% endblock %}
    </title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            padding-bottom: 40px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        .card-custom {
            background-color: #1e1e1e;
            border: 1px solid #333333;
            border-radius: 12px;
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }
        .table-container {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #333333;
        }
        .navbar-custom {
            background-color: #1e1e1e;
            border-bottom: 1px solid #333333;
        }
    </style>

    {% block extra_head %}{% endblock %}

</head>


<body>
    <!-- ---------------------------------------------------------------- -->
    <!-- 共通ナビゲーションバー                                            -->
    <!-- ---------------------------------------------------------------- -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-success fs-4" href="{% url 'index' %}">
                🌿 PEVS <span class="badge bg-success fs-6 align-middle">β版</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'index' %}">📊 ダッシュボード</a>
                    </li>
                    <!-- 将来の拡張用メニュー -->
                    <!-- 
                    <li class="nav-item">
                        <a class="nav-link" href="#">🪴 育成植物一覧</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">📡 デバイス管理</a>
                    </li> 
                    -->
                </ul>
                <span class="navbar-text text-secondary small">
                    🕒 <span id="realtime-clock">{% now "H:i:s" %}</span>
                </span>
            </div>
        </div>
    </nav>

    <!-- ---------------------------------------------------------------- -->
    <!-- メインコンテンツ挿入領域                                           -->
    <!-- ---------------------------------------------------------------- -->
    <main class="container">
        {% block content %}
        <!-- 各ページ（index.html等）の中身がここに差し込まれます -->
        {% endblock %}
    </main>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- リアルタイム時計スクリプト -->
    <script src="{% static 'dashboard/js/clock.js' %}"></script>

    {% block extra_js %}{% endblock %}    
</body>

</html>
