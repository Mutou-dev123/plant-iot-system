{% extends "base.html" %}

{% block title %}
    {{ title }}
{% endblock %}

{% block content %}

<h1>{{ title }}</h1>

<form class="form" method="post">

    {% csrf_token %}

    <div class="form-group">

        <label for="{{ form.custom_name.id_for_label }}">
            {{ form.custom_name.label }}
        </label>

        {{ form.custom_name }}

        {{ form.custom_name.errors }}

    </div>

    <div class="form-group">

        <label for="{{ form.plant_master.id_for_label }}">
            {{ form.plant_master.label }}
        </label>

        {{ form.plant_master }}

        {{ form.plant_master.errors }}

    </div>

    <div class="form-group">

        <label for="{{ form.start_date.id_for_label }}">
            {{ form.start_date.label }}
        </label>

        {{ form.start_date }}

        {{ form.start_date.errors }}

    </div>

    <button class="button-primary" type="submit">
        {{ button }}
    </button>

</form>

{% endblock %}
