{% extends "base.html" %}

{% block title %}植物管理{% endblock %}

{% block content %}

<h1>植物管理</h1>

<!-- 植物登録画面遷移ボタン -->
<a href="{% url 'plant_create' %}" class="button">
    + 植物を登録
</a>

<!-- 登録植物一覧表 -->
<table>
    <thead>
        <tr>
            <th>植物名</th>
            <th>種類</th>
            <th>開始日</th>
        </tr>
    </thead>

    <tbody>

        <!-- 登録済みがあるかどうか -->
        {% for plant in plants %}
            <tr>
                <td>
                    <a href="{% url 'plant_detail' plant.id %}">
                        {{ plant.custom_name }}
                    </a>
                </td>
                <td>{{ plant.plant_master.name }}</td>
                <td>{{ plant.start_date }}</td>
                <td>

                    <!-- 詳細ボタン -->
                    <a
                        href="{% url 'plant_detail' plant.id %}"
                        class="button button-detail"
                    >
                        詳細
                    </a>

                    <!-- 編集ボタン -->
                    <a
                        href="{% url 'plant_edit' plant.id %}"
                        class="button button-edit"
                    >
                        編集
                    </a>

                    <!-- 削除ボタン -->
                    <form
                        action="{% url 'plant_delete' plant.id %}"
                        method="post"
                        onsubmit="return confirm('「{{ plant.custom_name }}」を削除しますか？');"
                        class="inline-form"
                    >

                        {% csrf_token %}

                        <button
                            type="submit"
                            class="button button-delete"
                        >
                            削除
                        </button>

                    </form>

                </td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="4">植物が登録されていません。</td>

                <td>
                    <a href="{% url 'plant_create' %}">
                        植物登録はこちらから
                    </a>
                </td>
            </tr>
        {% endfor %}

    </tbody>
</table>

{% endblock %}
